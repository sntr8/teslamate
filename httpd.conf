<VirtualHost tesla.sntrserv.net:80>
    ServerName tesla.sntrserv.net

    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^/?(.*) https://%{SERVER_NAME}/$1 [R=301,L]
</VirtualHost>

<VirtualHost tesla.sntrserv.net:443>
    ServerName tesla.sntrserv.net

    SSLEngine On
    SSLCertificateFile /etc/letsencrypt/live/tesla.sntrserv.net/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/tesla.sntrserv.net/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    SSLProxyEngine On
    SSLProxyVerify none
    SSLProxyCheckPeerCN off
    SSLProxyCheckPeerName off
    SSLProxyCheckPeerExpire off

    ProxyPreserveHost On

    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*)           wss://127.0.0.1:9443/$1 [P,L]

    ProxyPass / https://127.0.0.1:9443/
    ProxyPassReverse / https://127.0.0.1:9443/
</VirtualHost>

<VirtualHost auth.sntrserv.net:80>
    ServerName auth.sntrserv.net

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteCond %{HTTPS} off
    RewriteRule ^/?(.*) https://%{SERVER_NAME}/$1 [R=301,L]
</VirtualHost>

<VirtualHost auth.sntrserv.net:443>
    ServerName auth.sntrserv.net

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/auth.sntrserv.net/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/auth.sntrserv.net/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
    ProxyPreserveHost On
    ProxyPass /.well-known !
    ProxyPass / http://localhost:9080/
    ProxyPassReverse / http://localhost:9080/
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host "auth.sntrserv.net"
</VirtualHost>